name: alif_design_system
description: Comprehensive design system and component library for Alif School application. Provides reusable Flutter widgets for admin panel and mobile app with responsive design, theming, and accessibility support.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core dependencies
  intl: ^0.19.0
  provider: ^6.0.0
  
  # UI/Charts
  fl_chart: ^0.64.0
  expandable: ^5.0.1
  
  # Icons
  flutter_svg: ^2.0.0
  
  # Utilities
  get: ^4.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # Font assets
  # assets:
  #   - assets/
  #   - assets/fonts/
  #   - assets/icons/
  
  fonts:
    # English fonts
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    
    # Malayalam fonts
    - family: Manjari
      fonts:
        - asset: assets/fonts/Manjari-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manjari-Bold.ttf
          weight: 700
